name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Permette anche di avviare manualmente dalla pagina Actions su GitHub
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # 1. Scarica il codice dal repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Installa Java 17 (richiesto da Android Gradle Plugin moderno)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Installa Android SDK con le versioni richieste dal progetto
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # 4. Cache Gradle — al secondo giro salta il download delle dipendenze (~2 min risparmiati)
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      # 5. Dai i permessi di esecuzione a gradlew
      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # 6. Build APK debug
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 7. Carica l'APK come artifact scaricabile dalla pagina Actions
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: duke390-dash-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
